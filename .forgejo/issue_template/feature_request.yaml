name: Feature request
about: Suggest a new feature or improvement
title: "[feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Before opening, please skim the [roadmap in the README](https://codeberg.org/jkaindl/json-editor#project-status) and existing issues — your idea may already be tracked.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that the plugin doesn't currently support?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would the ideal UX look like?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried, or other plugins that solve this differently.
  - type: textarea
    id: scope
    attributes:
      label: Scope check
      description: |
        This plugin is intentionally focused on viewing and editing JSON inside Obsidian. Adjacent formats (YAML, TOML, etc.) and schema-aware forms are out of scope. Does your proposal fit?
