name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build production bundle
        run: npm run build

      - name: Verify tag matches manifest version
        run: |
          TAG="${GITHUB_REF_NAME}"
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "Tag $TAG does not match manifest.json version $MANIFEST_VERSION" >&2
            exit 1
          fi

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Pull the section between "## [TAG]" and the next "## " header.
          NOTES=$(awk -v tag="$TAG" '
            $0 ~ "^## \\[" tag "\\]" {flag=1; next}
            flag && /^## / {flag=0}
            flag {print}
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release $TAG — see [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "${{ steps.notes.outputs.notes }}" \
            main.js manifest.json styles.css
